<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時巴士站</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; margin: 8px 0; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        .card:active { background: #eee; }
        .eta-time { font-weight: bold; color: #e31d2b; }
        #output { margin-top: 10px; }
    </style>
</head>
<body onload="autoSearch()">
    <div class="container">
        <h3 id="status">正在定位...</h3>
        <div id="output"></div>
    </div>

    <script>
        async function autoSearch() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');

            if (!navigator.geolocation) { status.innerText = "不支援定位"; return; }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                status.innerText = "搜尋附近車站...";

                try {
                    const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                    const data = await res.json();
                    
                    const stops = data.data.map(s => ({
                        ...s,
                        dist: Math.sqrt((s.lat - lat)**2 + (s.long - lon)**2) * 111
                    }))
                    .sort((a, b) => a.dist - b.dist)
                    .slice(0, 8); // 取最近 8 個站

                    status.innerText = "點擊車站查看班次";
                    output.innerHTML = "";
                    stops.forEach(s => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerHTML = `<div><strong>${s.name_tc}</strong></div><div style="font-size:0.8rem; color:#888;">距離 ${s.dist.toFixed(2)} km</div>`;
                        div.onclick = () => showEta(s.stop, s.name_tc);
                        output.appendChild(div);
                    });
                } catch (e) { status.innerText = "讀取失敗，請重新整理"; }
            }, () => { status.innerText = "請允許定位權限以使用功能"; });
        }

        async function showEta(stopId, name) {
            const output = document.getElementById('output');
            output.innerHTML = `<div>查詢中...</div>`;
            
            try {
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
                const data = await res.json();
                
                let html = `<h4>${name} <button onclick="location.reload()" style="float:right;">返回</button></h4>`;
                if (!data.data || data.data.length === 0) html += "目前無班次資訊";
                else {
                    data.data.forEach(b => {
                        const mins = Math.max(0, Math.round((new Date(b.eta) - new Date()) / 60000));
                        html += `<div class="card"><strong>${b.route}</strong> 往 ${b.dest_tc} <span class="eta-time">${mins} 分鐘</span></div>`;
                    });
                }
                output.innerHTML = html;
            } catch (e) { output.innerHTML = "無法獲取班次"; }
        }
    </script>
</body>
</html>

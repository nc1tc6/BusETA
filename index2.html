<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KMB Live Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 20px; }
        .card { border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 15px; background: white; }
        .row-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .eta-box { font-weight: bold; color: #d63384; }
    </style>
</head>
<body>

<div class="grid" id="dashboard">
    <div class="card">
        <h5>長康邨康順樓</h5>
        <div class="row-item" data-stop="7B2F696431303236" data-route="42A">
            <span>42A</span> <span class="eta">Loading...</span>
        </div>
        <div class="row-item" data-stop="7B2F696431303236" data-route="43A">
            <span>43A</span> <span class="eta">Loading...</span>
        </div>
    </div>
</div>

<script>
    async function updateETAs() {
        const rows = document.querySelectorAll(".row-item");
        for (let row of rows) {
            const stopId = row.getAttribute("data-stop");
            const route = row.getAttribute("data-route");
            const display = row.querySelector(".eta");

            try {
                // Fetching from the official Stop-ETA endpoint
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
                const json = await res.json();
                
                // Find the specific route in the returned list
                const bus = (json.data || []).find(b => b.route === route && b.eta);
                
                if (bus) {
                    const mins = Math.round((new Date(bus.eta) - new Date()) / 60000);
                    display.innerHTML = `<span class="eta-box">${mins <= 0 ? "Arriving" : mins + "m"}</span>`;
                } else {
                    display.innerHTML = "No Service";
                }
            } catch (e) {
                display.innerHTML = "Error";
            }
        }
    }

    updateETAs();
    setInterval(updateETAs, 30000); // Auto-refresh every 30 seconds
</script>
</body>
</html>

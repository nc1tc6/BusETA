<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>42A & 43C ETA (3 Buses)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; max-width: 500px; margin: 0 auto; font-family: -apple-system, sans-serif; }
        .station-title { background: #333; color: #fff; padding: 10px 15px; font-weight: bold; margin-top: 30px; border-radius: 6px 6px 0 0; }
        .bus-row { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .bus-row:last-child { border-bottom: none; border-radius: 0 0 6px 6px; }
        .route-badge { font-size: 1.4rem; font-weight: bold; color: #d9534f; min-width: 60px; }
        .eta-container { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: nowrap; }
        .eta-box { font-size: 0.85rem; width: 85px; text-align: center; padding: 6px; border-radius: 4px; display: inline-block; }
        .eta-time { font-size: 0.65rem; display: block; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="p-3 bg-danger text-white d-flex justify-content-between align-items-center shadow-sm">
        <h5 class="m-0">🚌 Inbound Board</h5>
        <button class="btn btn-sm btn-outline-light" onclick="getETAs()">Refresh</button>
    </div>

    <div class="container-fluid">
        <div class="station-title">長康邨康順樓 (TY313)</div>
        <div class="shadow-sm">
            <!-- 42A Row -->
            <div class="bus-row" data-route="42A" data-dir="inbound">
                <span class="route-badge">42A</span>
                <div class="eta-container">Loading...</div>
            </div>
            <!-- 43C Row -->
            <div class="bus-row" data-route="43C" data-dir="inbound">
                <span class="route-badge">43C</span>
                <div class="eta-container">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            getETAs();
            setInterval(getETAs, 30000); // Auto-refresh every 30 seconds
        });

        async function getETAs() {
            const rows = document.querySelectorAll(".bus-row");
            
            rows.forEach(async (row) => {
                const route = row.getAttribute("data-route");
                const dir = row.getAttribute("data-dir");
                const container = row.querySelector(".eta-container");

                try {
                    const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${route}/1`);
                    const json = await res.json();
                    
                    // Filter for Hong Shun House variants or near start of inbound routes
                    const records = (json.data || []).filter(item => 
                        item.dir === dir && 
                        (item.dest_tc_name === "長康邨康順樓" || item.dest_en_name?.includes("Hong Shun House") || item.seq === 2 || item.seq === 3) &&
                        item.eta
                    );

                    if (records.length > 0) {
                        container.innerHTML = "";
                        records.sort((a, b) => new Date(a.eta) - new Date(b.eta));
                        
                        // Changed slice to 0, 3 to grab up to 3 upcoming buses
                        records.slice(0, 3).forEach((bus) => {
                            const timeDiff = Math.round((new Date(bus.eta) - new Date()) / 60000);
                            const clock = new Date(bus.eta).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            
                            let color = "bg-success text-white";
                            let txt = `${timeDiff} min`;

                            if (timeDiff <= 0) { txt = "Arrived"; color = "bg-danger text-white"; }
                            else if (timeDiff <= 4) { color = "bg-danger text-white"; }
                            else if (timeDiff <= 8) { color = "bg-warning text-dark"; }

                            container.innerHTML += `
                                <div class="eta-box ${color}">
                                    <b>${txt}</b>
                                    <span class="eta-time">${clock}</span>
                                </div>`;
                        });
                    } else {
                        // Fallback processing if sequence logic shifts dynamically
                        const fallbackRecords = (json.data || []).filter(item => item.eta).slice(0, 3);
                        if (fallbackRecords.length > 0) {
                            container.innerHTML = "";
                            fallbackRecords.forEach(bus => {
                                const timeDiff = Math.round((new Date(bus.eta) - new Date()) / 60000);
                                const clock = new Date(bus.eta).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                                container.innerHTML += `<div class="eta-box bg-success text-white"><b>${timeDiff} min</b><span class="eta-time">${clock}</span></div>`;
                            });
                        } else {
                            container.innerHTML = `<span class="text-muted small">No Service</span>`;
                        }
                    }
                } catch (e) {
                    container.innerHTML = `<span class="text-danger small">Error</span>`;
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bus Dashboard (Dual ETA)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; max-width: 576px; margin: 0 auto; font-family: -apple-system, sans-serif; }
        .station-header { background: #343a40; color: white; padding: 10px 15px; font-weight: bold; border-radius: 8px 8px 0 0; margin-top: 20px; }
        .bus-row { background: white; border-bottom: 1px solid #e9ecef; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .bus-row:last-child { border-bottom: none; border-radius: 0 0 8px 8px; }
        .route-badge { font-size: 1.2rem; font-weight: 800; color: #dc3545; min-width: 70px; display: inline-block; }
        .eta-container { display: flex; gap: 6px; }
        .badge-eta { font-size: 0.85rem; min-width: 80px; text-align: center; padding: 6px 4px; display: inline-block; line-height: 1.2; }
        .arrival-time { font-size: 0.65rem; display: block; opacity: 0.85; font-weight: normal; margin-top: 1px; }
        .next-label { font-size: 0.55rem; text-transform: uppercase; font-weight: bold; opacity: 0.7; display: block; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-danger sticky-top shadow-sm">
        <div class="container-fluid d-flex justify-content-between px-3">
            <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-table-list me-2"></i> My Commute Board</span>
            <button id="refreshBtn" class="btn btn-outline-light btn-sm" onclick="fetchAllETAs()" disabled><i class="fa-solid fa-sync fa-spin"></i> Connecting KMB...</button>
        </div>
    </nav>

    <div class="container pb-5">
        <!-- Station Group 1 -->
        <div class="station-header shadow-sm">
            <i class="fa-solid fa-location-dot me-2 text-warning"></i> 長康邨康順樓 (TY313)
        </div>
        <div class="shadow-sm">
            <div class="bus-row" data-route="43C" data-keyword="康順樓">
                <span class="route-badge">43C</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
            <div class="bus-row" data-route="42A" data-keyword="康順樓">
                <span class="route-badge">42A</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
            <div class="bus-row" data-route="42C" data-keyword="康順樓">
                <span class="route-badge">42C</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
        </div>

        <!-- Station Group 2 -->
        <div class="station-header shadow-sm">
            <i class="fa-solid fa-location-dot me-2 text-warning"></i> 長康邨康祥樓 (TY256)
        </div>
        <div class="shadow-sm">
            <div class="bus-row" data-route="948" data-keyword="康祥樓">
                <span class="route-badge">948</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
            <div class="bus-row" data-route="X42C" data-keyword="康祥樓">
                <span class="route-badge">X42C</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
            <div class="bus-row" data-route="948A" data-keyword="康祥樓">
                <span class="route-badge">948A</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
        </div>

        <!-- Station Group 3 -->
        <div class="station-header shadow-sm">
            <i class="fa-solid fa-location-dot me-2 text-warning"></i> 青盛苑 (TY317)
        </div>
        <div class="shadow-sm">
            <div class="bus-row" data-route="948B" data-keyword="青盛苑">
                <span class="route-badge">948B</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
            <div class="bus-row" data-route="43B" data-keyword="青盛苑">
                <span class="route-badge">43B</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
            <div class="bus-row" data-route="243M" data-keyword="青盛苑">
                <span class="route-badge">243M</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
            <div class="bus-row" data-route="241X" data-keyword="青盛苑">
                <span class="route-badge">241X</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
            <div class="bus-row" data-route="49A" data-keyword="青盛苑">
                <span class="route-badge">49A</span>
                <div class="eta-container">
                    <span class="badge bg-secondary badge-eta">Waiting...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
        
        let stopHexMap = {
            "康順樓": null,
            "康祥樓": null,
            "青盛苑": null
        };

        document.addEventListener("DOMContentLoaded", async () => {
            await initializeMasterDirectory();
        });

        async function initializeMasterDirectory() {
            try {
                const response = await fetch(`${API_BASE}/stop`);
                const masterData = await response.json();
                
                if (masterData && masterData.data) {
                    for (let station of masterData.data) {
                        if (station.name_tc.includes("長康邨康順樓") || (station.name_tc.includes("康順樓") && station.lat > 22.34)) {
                            stopHexMap["康順樓"] = station.stop;
                        }
                        if (station.name_tc.includes("長康邨康祥樓") || (station.name_tc.includes("康祥樓") && station.lat > 22.34)) {
                            stopHexMap["康祥樓"] = station.stop;
                        }
                        if (station.name_tc.includes("青盛苑")) {
                            stopHexMap["青盛苑"] = station.stop;
                        }
                    }
                }

                const refreshBtn = document.getElementById("refreshBtn");
                refreshBtn.removeAttribute("disabled");
                refreshBtn.innerHTML = '<i class="fa-solid fa-rotate"></i> Refresh';
                
                fetchAllETAs();
                setInterval(fetchAllETAs, 30000);

            } catch (err) {
                console.error("Directory sync error:", err);
                document.getElementById("refreshBtn").innerText = "Sync Failed";
            }
        }

        function fetchAllETAs() {
            const rows = document.querySelectorAll(".bus-row");
            
            rows.forEach(row => {
                const route = row.getAttribute("data-route");
                const keyword = row.getAttribute("data-keyword");
                const container = row.querySelector(".eta-container");
                const resolvedStopHex = stopHexMap[keyword];

                if (!resolvedStopHex) {
                    container.innerHTML = `<span class="badge bg-dark badge-eta">Map Error</span>`;
                    return;
                }

                container.innerHTML = `<span class="badge bg-secondary badge-eta">Updating...</span>`;
                getLineArrivalDetails(route, resolvedStopHex, container);
            });
        }

        async function getLineArrivalDetails(route, stopHexId, containerNode) {
            try {
                const response = await fetch(`${API_BASE}/stop-eta/${stopHexId}`);
                const stopMasterLogs = await response.json();
                
                // Get all valid ETAs for this route ordered by arrival sequence
                const targetedLogs = (stopMasterLogs.data || [])
                    .filter(item => item.route === route && item.eta)
                    .sort((a, b) => a.eta_seq - b.eta_seq);

                if (targetedLogs.length > 0) {
                    containerNode.innerHTML = ""; // Clear loader string

                    // Take the first 2 upcoming buses
                    const busesToShow = targetedLogs.slice(0, 2);

                    busesToShow.forEach((bus, index) => {
                        const etaTime = new Date(bus.eta);
                        const diffMs = etaTime - new Date();
                        const minutesLeft = Math.round(diffMs / 60000);
                        const formattedClockTime = etaTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        let badgeClass = "bg-success";
                        let timeText = `${minutesLeft} min`;
                        let labelPrefix = index === 0 ? "1st" : "2nd";

                        if (minutesLeft < 0) {
                            timeText = "Departed";
                            badgeClass = "bg-dark";
                        } else if (minutesLeft === 0) {
                            timeText = "Arriving";
                            badgeClass = "bg-danger";
                        } else if (minutesLeft <= 3) {
                            badgeClass = "bg-danger";
                        } else if (minutesLeft <= 8) {
                            badgeClass = "bg-warning text-dark";
                        }

                        const etaBadge = document.createElement("span");
                        etaBadge.className = `badge ${badgeClass} badge-eta`;
                        etaBadge.innerHTML = `
                            <span class="next-label">${labelPrefix} Bus</span>
                            ${timeText}
                            <span class="arrival-time">${formattedClockTime}</span>
                        `;
                        containerNode.appendChild(etaBadge);
                    });
                } else {
                    containerNode.innerHTML = `<span class="badge bg-light text-muted border badge-eta">No Service</span>`;
                }
            } catch (e) {
                containerNode.innerHTML = `<span class="badge bg-secondary badge-eta">Failed</span>`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB Tracker 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --kmb-red: #e31837; --bg-color: #f1f5f9; }
        
        /* Strict Layout: No scroll on body */
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg-color); }

        .app-wrapper { height: 100vh; display: flex; flex-direction: column; }

        /* Pinned Header */
        .sticky-header { background: white; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); z-index: 100; }
        
        /* Scrollable List Area */
        #scrollContainer { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }

        /* Modern Row Design */
        .stop-row { 
            background: white; border-radius: 0.75rem; padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-left: 5px solid var(--kmb-red);
        }

        .eta-badge { 
            background: #fff1f2; color: var(--kmb-red); font-weight: 700; font-size: 0.85rem;
            padding: 0.4rem 0.8rem; border-radius: 0.4rem; margin-left: 0.4rem;
        }

        .nav-link.active { background-color: var(--kmb-red) !important; color: white !important; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header class="sticky-header">
            <h5 class="mb-3"><i class="fa-solid fa-bus text-danger"></i> KMB Route Tracker</h5>
            <div class="input-group mb-3">
                <input type="text" id="routeInput" class="form-control" placeholder="Enter Route (e.g., 42A)">
                <button class="btn btn-danger" onclick="searchRoute()">Track</button>
            </div>
            <div id="directionTabs" class="nav nav-pills gap-2 d-none"></div>
        </header>

        <div id="scrollContainer">
            <!-- Scrollable content lives here -->
            <div id="stopList" class="d-flex flex-column gap-2"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
        let activeRoute = "", availableVariants = [], etaInterval = null;

        async function searchRoute() {
            activeRoute = document.getElementById('routeInput').value.trim().toUpperCase();
            if (!activeRoute) return;
            try {
                const res = await fetch(`${API_BASE}/route/`);
                const data = await res.json();
                availableVariants = data.data.filter(item => item.route === activeRoute);
                
                const tabs = document.getElementById('directionTabs');
                tabs.innerHTML = "";
                availableVariants.forEach((v, i) => {
                    const btn = document.createElement('a');
                    btn.className = `nav-link ${i === 0 ? 'active' : ''}`;
                    btn.href = "#";
                    btn.innerText = `To ${v.dest_tc}`;
                    btn.onclick = (e) => { e.preventDefault(); loadRoute(i); document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); btn.classList.add('active'); };
                    tabs.appendChild(btn);
                });
                tabs.classList.remove('d-none');
                await loadRoute(0);
            } catch(e) { alert("Route not found"); }
        }

        async function loadRoute(idx) {
            const v = availableVariants[idx];
            const res = await fetch(`${API_BASE}/route-stop/${activeRoute}/${v.bound === 'O' ? 'outbound' : 'inbound'}/${v.service_type || '1'}`);
            const data = await res.json();
            const list = document.getElementById('stopList');
            list.innerHTML = "";
            
            for (const s of data.data.sort((a,b) => a.seq - b.seq)) {
                const sRes = await fetch(`${API_BASE}/stop/${s.stop}`);
                const sData = await sRes.json();
                list.insertAdjacentHTML('beforeend', `
                    <div class="stop-row">
                        <div class="text-truncate"><strong>#${s.seq}</strong> ${sData.data.name_tc}</div>
                        <div id="eta-${s.stop}" class="text-nowrap"></div>
                    </div>`);
            }
            refreshAllETAs(v);
            if (etaInterval) clearInterval(etaInterval);
            etaInterval = setInterval(() => refreshAllETAs(v), 30000);
        }

        async function refreshAllETAs(v) {
            const stops = document.querySelectorAll('[id^="eta-"]');
            for (const el of stops) {
                const sid = el.id.replace('eta-', '');
                try {
                    const res = await fetch(`${API_BASE}/eta/${sid}/${activeRoute}/${v.service_type || '1'}`);
                    const data = await res.json();
                    const etas = data.data.filter(i => i.dir === v.bound && i.eta);
                    el.innerHTML = etas.length ? etas.map(i => `<span class="eta-badge">${Math.max(0, Math.round((new Date(i.eta) - new Date()) / 60000))}m</span>`).join('') : '<span class="text-muted small">--</span>';
                } catch(e) { el.innerHTML = "Err"; }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB 8-Route Concurrent Tracker</title>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; background: #f1f5f9; }
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; }
        
        .dashboard-grid { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; 
            flex: 1; overflow-x: auto; padding: 10px;
        }

        .tracker-column { 
            display: flex; flex-direction: column; height: 100%; 
            background: white; border-radius: 4px; overflow: hidden; border: 1px solid #dee2e6;
        }

        .column-header { 
            background: #e31837; color: white; padding: 6px; font-weight: bold; 
            text-align: center; line-height: 1.1;
        }
        
        .column-header .route-num { font-size: 0.9rem; display: block; }
        .column-header .dest-text { font-size: 0.65rem; opacity: 0.9; font-weight: normal; }
        
        .scroll-area { flex: 1; overflow-y: auto; padding: 4px; }
        .stop-row { 
            padding: 4px; border-bottom: 1px solid #eee; font-size: 0.75rem; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .eta-text { color: #e31837; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header style="background: #212529; color: white; padding: 10px; font-weight: bold;">
            KMB 8-Route Concurrent Tracker
        </header>

        <div class="dashboard-grid" id="mainDashboard"></div>
    </div>

    <script>
        const API_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
        const routesToTrack = ["42A", "6C", "1A", "27", "87D", "213X", "68X", "968"];

        async function initDashboard() {
            const container = document.getElementById('mainDashboard');
            routesToTrack.forEach((route, i) => {
                const col = document.createElement('div');
                col.className = 'tracker-column';
                col.innerHTML = `
                    <div class="column-header" id="header-${i}">
                        <span class="route-num">${route}</span>
                        <span class="dest-text">Loading...</span>
                    </div>
                    <div class="scroll-area" id="col-${i}"></div>
                `;
                container.appendChild(col);
                fetchRouteData(route, i);
            });
        }

        async function fetchRouteData(route, index) {
            try {
                const res = await fetch(`${API_BASE}/route/`);
                const data = await res.json();
                const variant = data.data.find(r => r.route === route);
                
                // Update header with direction
                document.getElementById(`header-${index}`).innerHTML = 
                    `<span class="route-num">${route}</span><span class="dest-text">${variant.dest_tc}</span>`;
                
                const dir = variant.bound === 'O' ? 'outbound' : 'inbound';
                const stopRes = await fetch(`${API_BASE}/route-stop/${route}/${dir}/${variant.service_type || '1'}`);
                const stopData = await stopRes.json();
                
                const area = document.getElementById(`col-${index}`);
                for (const s of stopData.data.sort((a,b) => a.seq - b.seq)) {
                    const sRes = await fetch(`${API_BASE}/stop/${s.stop}`);
                    const sData = await sRes.json();
                    area.insertAdjacentHTML('beforeend', `
                        <div class="stop-row">
                            <span class="text-truncate">${sData.data.name_tc}</span>
                            <span id="eta-${index}-${s.stop}" class="eta-text"></span>
                        </div>`);
                }
                updateETAs(index, route, variant);
                setInterval(() => updateETAs(index, route, variant), 30000);
            } catch(e) { console.error(e); }
        }

        async function updateETAs(index, route, variant) {
            const stops = document.querySelectorAll(`[id^="eta-${index}-"]`);
            for (const el of stops) {
                const sid = el.id.replace(`eta-${index}-`, '');
                const res = await fetch(`${API_BASE}/eta/${sid}/${route}/${variant.service_type || '1'}`);
                const data = await res.json();
                const etas = data.data.filter(i => i.dir === variant.bound && i.eta);
                el.innerHTML = etas.map(i => `${Math.max(0, Math.round((new Date(i.eta) - new Date()) / 60000))}m`).join(' ');
            }
        }

        initDashboard();
    </script>
</body>
</html>

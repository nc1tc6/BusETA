<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB 19-Route Optimized Tracker</title>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; background: #f1f5f9; }
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; }
        
        /* Dashboard split into 3 vertical groups */
        .dashboard-container { 
            flex: 1; overflow-y: auto; padding: 10px;
            display: grid; grid-template-rows: repeat(3, minmax(200px, 1fr)); gap: 15px; 
        }

        .row-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 8px; 
        }

        .tracker-column { 
            background: white; border-radius: 4px; border: 1px solid #dee2e6;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .column-header { 
            background: #e31837; color: white; padding: 4px; text-align: center; 
            cursor: pointer; font-size: 0.8rem; font-weight: bold;
        }
        
        .scroll-area { flex: 1; overflow-y: auto; padding: 5px; }
        .stop-row { 
            padding: 3px 0; border-bottom: 1px solid #f0f0f0; 
            font-size: 0.65rem; display: flex; flex-direction: column; 
        }
        .stop-name { font-weight: 500; color: #333; }
        .eta-container { display: flex; gap: 5px; margin-top: 2px; color: #e31837; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header style="background: #212529; color: white; padding: 8px; font-weight: bold; font-size: 0.9rem;">
            KMB 19-Route Monitoring Dashboard
        </header>
        <div class="dashboard-container" id="mainDashboard">
            <div class="row-group" id="row-0"></div>
            <div class="row-group" id="row-1"></div>
            <div class="row-group" id="row-2"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
        const routesToTrack = ["42A", "242X", "249X", "43A", "243M", "43B", "241X", "249M", "948", "948A", "948B", "948X", "43", "279X", "68E", "E42", "E31", "E32", "A32"];
        const targetStops = ["長康邨康順樓", "青盛苑", "青華苑", "長康巴士總站"];
        let routeStates = {};

        function initDashboard() {
            routesToTrack.forEach((route, i) => {
                routeStates[i] = { idx: 0, variants: [] };
                // Distribute into 3 rows
                const rowId = i % 3;
                const col = document.createElement('div');
                col.className = 'tracker-column';
                col.innerHTML = `<div class="column-header" id="header-${i}" onclick="toggleDirection(${i}, '${route}')">
                                    ${route}</div><div class="scroll-area" id="col-${i}"></div>`;
                document.getElementById(`row-${rowId}`).appendChild(col);
                loadRouteData(i, route);
            });
        }

        async function loadRouteData(i, route) {
            try {
                const res = await fetch(`${API_BASE}/route/`);
                const data = await res.json();
                routeStates[i].variants = data.data.filter(r => r.route === route);
                renderRoute(i, route);
            } catch(e) {}
        }

        async function renderRoute(i, route) {
            const v = routeStates[i].variants[routeStates[i].idx];
            if(!v) return;
            const area = document.getElementById(`col-${i}`);
            area.innerHTML = "";
            const res = await fetch(`${API_BASE}/route-stop/${route}/${v.bound === 'O' ? 'outbound' : 'inbound'}/${v.service_type || '1'}`);
            const data = await res.json();
            
            for (const s of data.data.sort((a,b) => a.seq - b.seq)) {
                const sRes = await fetch(`${API_BASE}/stop/${s.stop}`);
                const sData = await sRes.json();
                if (targetStops.some(t => sData.data.name_tc.includes(t))) {
                    area.insertAdjacentHTML('beforeend', `<div class="stop-row">
                        <span class="stop-name">${sData.data.name_tc}</span>
                        <span class="eta-container" id="eta-${i}-${s.stop}"></span></div>`);
                }
            }
            updateETAs(i, route, v);
            setInterval(() => updateETAs(i, route, v), 30000);
        }

        function toggleDirection(i, route) {
            routeStates[i].idx = (routeStates[i].idx + 1) % routeStates[i].variants.length;
            renderRoute(i, route);
        }

        async function updateETAs(i, route, v) {
            const els = document.querySelectorAll(`[id^="eta-${i}-"]`);
            for (const el of els) {
                const sid = el.id.replace(`eta-${i}-`, '');
                try {
                    const res = await fetch(`${API_BASE}/eta/${sid}/${route}/${v.service_type || '1'}`);
                    const data = await res.json();
                    el.innerHTML = data.data.filter(e => e.dir === v.bound && e.eta)
                        .map(e => `${Math.max(0, Math.round((new Date(e.eta) - new Date()) / 60000))}m`).join(' ');
                } catch(e) {}
            }
        }
        initDashboard();
    </script>
</body>
</html>

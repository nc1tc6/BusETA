<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB 19-Route Monitoring Dashboard</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #212529; color: #333; }
        .app-wrapper { padding: 10px; }
        h1 { color: white; font-size: 1.2rem; margin-bottom: 10px; }

        /* Grid fixed to 8 columns as seen in the reference */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 10px;
        }

        .tracker-column { 
            background: white; border-radius: 4px; overflow: hidden; 
            border: 1px solid #dee2e6; display: flex; flex-direction: column;
            min-height: 200px;
        }

        .column-header { 
            background: #e31837; color: white; padding: 6px; text-align: center; 
            cursor: pointer; font-weight: bold; font-size: 0.85rem;
        }
        .dest-sub { font-size: 0.65rem; font-weight: normal; display: block; opacity: 0.95; text-decoration: underline; }

        .scroll-area { padding: 5px; font-size: 0.75rem; }
        .stop-row { padding: 4px 0; border-bottom: 1px solid #eee; display: flex; flex-direction: column; }
        .eta-text { color: #e31837; font-weight: bold; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>KMB 19-Route Monitoring Dashboard</h1>
        <div class="dashboard-grid" id="mainDashboard"></div>
    </div>

    <script>
        const API_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
        const routesToTrack = ["42A", "242X", "249X", "43A", "243M", "43B", "241X", "249M", "948", "948A", "948B", "948X", "43", "279X", "68E", "E42", "E31", "E32", "A32"];
        const targetStops = ["長康邨康順樓", "青盛苑", "青華苑", "長康巴士總站"];
        let routeStates = {};

        async function initDashboard() {
            const container = document.getElementById('mainDashboard');
            routesToTrack.forEach((route, i) => {
                routeStates[i] = { idx: 0, variants: [] };
                const col = document.createElement('div');
                col.className = 'tracker-column';
                col.innerHTML = `<div class="column-header" id="header-${i}" onclick="toggleDirection(${i}, '${route}')">
                                    ${route}<span class="dest-sub">Loading...</span>
                                 </div>
                                 <div class="scroll-area" id="col-${i}"></div>`;
                container.appendChild(col);
                loadRouteData(i, route);
            });
        }

        async function loadRouteData(i, route) {
            const res = await fetch(`${API_BASE}/route/`);
            const data = await res.json();
            routeStates[i].variants = data.data.filter(r => r.route === route);
            renderRoute(i, route);
        }

        async function renderRoute(i, route) {
            const v = routeStates[i].variants[routeStates[i].idx];
            document.getElementById(`header-${i}`).innerHTML = `${route}<span class="dest-sub">往 ${v.dest_tc}</span>`;
            
            const area = document.getElementById(`col-${i}`);
            area.innerHTML = "";
            const res = await fetch(`${API_BASE}/route-stop/${route}/${v.bound === 'O' ? 'outbound' : 'inbound'}/${v.service_type || '1'}`);
            const data = await res.json();
            
            for (const s of data.data.sort((a,b) => a.seq - b.seq)) {
                const sRes = await fetch(`${API_BASE}/stop/${s.stop}`);
                const sData = await sRes.json();
                if (targetStops.some(t => sData.data.name_tc.includes(t))) {
                    area.insertAdjacentHTML('beforeend', `<div class="stop-row">
                        <div>${sData.data.name_tc}</div>
                        <div class="eta-text" id="eta-${i}-${s.stop}"></div></div>`);
                }
            }
            updateETAs(i, route, v);
            setInterval(() => updateETAs(i, route, v), 30000);
        }

        function toggleDirection(i, route) {
            routeStates[i].idx = (routeStates[i].idx + 1) % routeStates[i].variants.length;
            renderRoute(i, route);
        }

        async function updateETAs(i, route, v) {
            const els = document.querySelectorAll(`[id^="eta-${i}-"]`);
            for (const el of els) {
                const sid = el.id.replace(`eta-${i}-`, '');
                try {
                    const res = await fetch(`${API_BASE}/eta/${sid}/${route}/${v.service_type || '1'}`);
                    const data = await res.json();
                    el.innerHTML = data.data.filter(e => e.dir === v.bound && e.eta)
                        .map(e => `${Math.max(0, Math.round((new Date(e.eta) - new Date()) / 60000))}m`).join(' ');
                } catch(e) {}
            }
        }
        initDashboard();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB Multi-Route Tracker 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; }
        
        /* 8-Column Grid Layout */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            gap: 10px; 
            flex: 1; 
            overflow-x: auto; 
            padding: 10px;
        }

        .tracker-column { 
            display: flex; flex-direction: column; height: 100%; 
            background: white; border-radius: 8px; overflow: hidden; border: 1px solid #dee2e6;
        }

        .column-header { background: #e31837; color: white; padding: 10px; font-weight: bold; text-align: center; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 5px; }
        .stop-row { padding: 8px; border-bottom: 1px solid #eee; font-size: 0.85rem; display: flex; justify-content: space-between; }
        .eta-badge { background: #fff1f2; color: #e31837; font-size: 0.75rem; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header class="p-3 bg-dark text-white">
            <h5>KMB 8-Route Concurrent Tracker</h5>
        </header>

        <div class="dashboard-grid" id="mainDashboard">
            <!-- 8 Columns Generated by Script -->
        </div>
    </div>

    <script>
        const API_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
        const routesToTrack = ["42A", "6C", "1A", "27", "87D", "213X", "68X", "968"];

        async function initDashboard() {
            const container = document.getElementById('mainDashboard');
            for (let i = 0; i < 8; i++) {
                const col = document.createElement('div');
                col.className = 'tracker-column';
                col.innerHTML = `
                    <div class="column-header">${routesToTrack[i]}</div>
                    <div class="scroll-area" id="col-${i}">Loading...</div>
                `;
                container.appendChild(col);
                fetchRouteData(routesToTrack[i], i);
            }
        }

        async function fetchRouteData(route, index) {
            try {
                const res = await fetch(`${API_BASE}/route/`);
                const data = await res.json();
                const variant = data.data.find(r => r.route === route);
                const dir = variant.bound === 'O' ? 'outbound' : 'inbound';
                
                const stopRes = await fetch(`${API_BASE}/route-stop/${route}/${dir}/${variant.service_type || '1'}`);
                const stopData = await stopRes.json();
                
                renderColumn(index, stopData.data, route, variant);
            } catch(e) { document.getElementById(`col-${index}`).innerText = "Error"; }
        }

        async function renderColumn(index, stops, route, variant) {
            const area = document.getElementById(`col-${index}`);
            area.innerHTML = "";
            for (const s of stops.sort((a,b) => a.seq - b.seq)) {
                const sRes = await fetch(`${API_BASE}/stop/${s.stop}`);
                const sData = await sRes.json();
                area.insertAdjacentHTML('beforeend', `
                    <div class="stop-row">
                        <span>${sData.data.name_tc}</span>
                        <span id="eta-${index}-${s.stop}"></span>
                    </div>`);
            }
            updateETAs(index, route, variant);
            setInterval(() => updateETAs(index, route, variant), 30000);
        }

        async function updateETAs(index, route, variant) {
            const stops = document.querySelectorAll(`[id^="eta-${index}-"]`);
            for (const el of stops) {
                const sid = el.id.replace(`eta-${index}-`, '');
                const res = await fetch(`${API_BASE}/eta/${sid}/${route}/${variant.service_type || '1'}`);
                const data = await res.json();
                const etas = data.data.filter(i => i.dir === variant.bound && i.eta);
                el.innerHTML = etas.map(i => `<span class="eta-badge">${Math.max(0, Math.round((new Date(i.eta) - new Date()) / 60000))}m</span>`).join(' ');
            }
        }

        initDashboard();
    </script>
</body>
</html>

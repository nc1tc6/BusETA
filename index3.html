<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB Bus Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; margin: 0; min-height: 100vh; }
        
        .app-container {
            background-color: white;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }

        #stopList {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 992px) {
            #stopList { grid-template-columns: 1fr 1fr; }
        }

        .navbar { border-bottom: 4px solid #e31837; margin-bottom: 20px; }
        .btn-danger { background-color: #e31837; border-color: #e31837; }
        .eta-card { border-left: 5px solid #6c757d; }
        .badge-eta { font-size: 0.85rem; min-width: 80px; }
    </style>
</head>
<body>

    <div class="app-container">
        <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
            <div class="container-fluid justify-content-center">
                <span class="navbar-brand"><i class="fa-solid fa-bus me-2 text-danger"></i>KMB ETA Tracker</span>
            </div>
        </nav>

        <div class="container">
            <div class="input-group input-group-lg shadow-sm mb-4">
                <input type="text" id="routeInput" class="form-control text-uppercase" placeholder="Enter Route (e.g., 42A)">
                <button class="btn btn-danger px-4" onclick="searchRoute()"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div id="directionBlock" class="d-grid gap-2 mb-4 d-none"></div>
            <div id="loading" class="text-center py-5 d-none"><div class="spinner-border text-danger"></div></div>
            <div id="stopList"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
        let activeRoute = "", availableVariants = [], etaInterval = null;

        async function searchRoute() {
            activeRoute = document.getElementById('routeInput').value.trim().toUpperCase();
            if (!activeRoute) return;
            toggleElement('loading', true);
            document.getElementById('stopList').innerHTML = "";
            if (etaInterval) clearInterval(etaInterval);
            
            try {
                const res = await fetch(`${API_BASE}/route/`);
                const data = await res.json();
                availableVariants = data.data.filter(item => item.route === activeRoute);
                
                const container = document.getElementById('directionBlock');
                container.innerHTML = "";
                availableVariants.forEach((v, i) => {
                    const btn = document.createElement('button');
                    btn.className = `btn btn-${i === 0 ? 'danger' : 'outline-danger'} text-start py-2 px-3`;
                    btn.onclick = () => loadRoute(i);
                    btn.innerHTML = `<i class="fa-solid fa-circle-arrow-right me-2"></i>往 ${v.dest_tc}`;
                    container.appendChild(btn);
                });
                container.classList.remove('d-none');
                await loadRoute(0);
            } catch(e) { console.error(e); alert("Error fetching data"); } finally { toggleElement('loading', false); }
        }

        async function loadRoute(idx) {
            const v = availableVariants[idx];
            const dir = v.bound === 'O' ? 'outbound' : 'inbound';
            const res = await fetch(`${API_BASE}/route-stop/${activeRoute}/${dir}/${v.service_type || '1'}`);
            const data = await res.json();
            const sortedStops = data.data.sort((a, b) => a.seq - b.seq);
            
            const list = document.getElementById('stopList');
            list.innerHTML = "";
            
            for (const s of sortedStops) {
                const sRes = await fetch(`${API_BASE}/stop/${s.stop}`);
                const sData = await sRes.json();
                const card = document.createElement('div');
                card.className = "card shadow-sm eta-card";
                card.innerHTML = `<div class="card-body d-flex justify-content-between align-items-center p-3">
                                    <div class="small fw-bold">#${s.seq} - ${sData.data.name_tc}</div>
                                    <span class="badge bg-secondary badge-eta" id="eta-${s.stop}">...</span>
                                  </div>`;
                list.appendChild(card);
            }
            
            // Initial load and start auto-refresh
            refreshAllETAs(v);
            if (etaInterval) clearInterval(etaInterval);
            etaInterval = setInterval(() => refreshAllETAs(v), 30000);
        }

        async function refreshAllETAs(v) {
            const stops = Array.from(document.querySelectorAll('[id^="eta-"]'));
            for (const el of stops) {
                const sid = el.id.replace('eta-', '');
                try {
                    const res = await fetch(`${API_BASE}/eta/${sid}/${activeRoute}/${v.service_type || '1'}`);
                    const data = await res.json();
                    const eta = data.data.find(i => i.dir === v.bound);
                    if (eta) {
                        const min = Math.round((new Date(eta.eta) - new Date()) / 60000);
                        el.innerText = min < 0 ? "Departed" : (min === 0 ? "Arriving" : min + " min");
                        el.className = `badge ${min <= 3 ? 'bg-danger' : 'bg-success'} badge-eta`;
                    } else { el.innerText = "No Service"; el.className = "badge bg-light text-dark badge-eta"; }
                } catch(e) { el.innerText = "Err"; }
            }
        }

        function toggleElement(id, show) { document.getElementById(id).classList.toggle('d-none', !show); }
    </script>
</body>
</html>

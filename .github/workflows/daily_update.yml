name: Daily Transport Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 從 v3 更新到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 從 v4 更新到 v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector script
        run: python update_stops.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add stops.json
          git commit -m "Automated update of stops.json" || exit 0
          git push

name: Daily Transport Data Update

on:
  schedule:
    - cron: '0 0 * * *' # 每天午夜 0 點執行
  workflow_dispatch:    # 允許你手動按一下按鈕就執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector script
        run: python update_stops.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add stops.json
          git commit -m "Automated update of stops.json" || exit 0
          git push

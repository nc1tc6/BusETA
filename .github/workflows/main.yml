name: Update Bus Data

on:
  schedule:
    - cron: '*/1 * * * *'  # 每 1 分鐘執行一次
  workflow_dispatch:        # 讓你可以在網頁上手動點擊執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 必須要有寫入權限才能推送更新
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bus data script
        run: python get_bus.py  # 確保根目錄下有這個檔案

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data.json
          # 檢查 data.json 是否有實際變動
          # 只有在有變動的情況下才進行 commit 和 push，避免浪費資源
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update bus data" && git push)

name: Update Bus Data

on:
  schedule:
    - cron: '*/15 * * * *'  # 每 15 分鐘執行一次
  workflow_dispatch:        # 讓你可以在網頁上手動點擊執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 給予寫入權限，讓我們可以儲存 data.json
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python get_bus.py  # 這裡要確保你的檔案真的叫 get_bus.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # 如果 data.json 有變更，就自動推送到你的 repository
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update bus data" && git push)

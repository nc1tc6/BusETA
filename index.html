<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>九巴精準快查</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 15px; }
        .card { background: white; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid #ccc; }
        .nearest { border-left-color: #e31d2b; background: #fff0f0; }
        .title { font-weight: bold; margin: 20px 0 10px; color: #333; font-size: 1.2rem; }
        .eta-time { color: #e31d2b; font-weight: bold; }
        #status { color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <input type="text" id="route" placeholder="路線(如 6)">
    <button onclick="smartSearch()">查詢</button>
    <div id="status"></div>
    <div id="output"></div>

    <script>
        async function smartSearch() {
            const routeInput = document.getElementById('route').value.trim().toUpperCase();
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            
            if (!routeInput) return;
            output.innerHTML = "";
            status.innerText = "定位中...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                status.innerText = "查詢路線資料中...";

                try {
                    const routeRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route/${routeInput}`);
                    const routeData = await routeRes.json();
                    
                    if (!routeData.data || routeData.data.length === 0) throw new Error("路線不存在");

                    for (let r of routeData.data) {
                        const stopsRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${r.route}/${r.service_type}/${r.bound}`);
                        if (!stopsRes.ok) continue;
                        const stopsData = await stopsRes.json();
                        
                        const allStopsRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop`);
                        const allStops = await allStopsRes.json();
                        
                        let minD = Infinity, nearestIdx = 0;
                        const sequence = stopsData.data.map((s, idx) => {
                            const info = allStops.data.find(st => st.stop === s.stop);
                            const d = Math.sqrt((info.lat - lat)**2 + (info.long - lon)**2);
                            if(d < minD) { minD = d; nearestIdx = idx; }
                            return { ...s, name: info.name_tc };
                        });

                        output.innerHTML += `<div class="title">往 ${r.dest_tc}</div>`;
                        const indices = [nearestIdx - 1, nearestIdx, nearestIdx + 1];
                        
                        for (let i of indices) {
                            if (sequence[i]) {
                                const s = sequence[i];
                                const etaRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${s.stop}`);
                                const eta = etaRes.ok ? await etaRes.json() : { data: [] };
                                const bus = (eta.data || []).find(b => b.route === routeInput);
                                const time = bus ? (Math.round((new Date(bus.eta) - new Date())/60000) <= 0 ? '到達' : Math.round((new Date(bus.eta) - new Date())/60000) + ' 分') : '-';
                                
                                output.innerHTML += `
                                    <div class="card ${i === nearestIdx ? 'nearest' : ''}">
                                        <b>${s.name}</b><br>
                                        預計到達: <span class="eta-time">${time}</span>
                                    </div>`;
                            }
                        }
                    }
                    status.innerText = "查詢完成";
                } catch(e) {
                    status.innerText = "錯誤: " + e.message;
                }
            }, () => { status.innerText = "請允許定位權限以繼續。"; });
        }
    </script>
</body>
</html>

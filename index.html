<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴快查</title>
    <style>
        :root { --primary: #e31d2b; }
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
        .header { position: sticky; top: 0; background: #fff; padding: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .group-title { font-size: 0.85rem; font-weight: bold; color: #666; margin: 15px 0 5px; text-transform: uppercase; }
        .card { background: white; padding: 10px; margin-bottom: 6px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .stop-info { font-size: 0.9rem; font-weight: 500; }
        .eta-time { font-size: 0.9rem; font-weight: bold; color: var(--primary); background: #fff0f0; padding: 2px 8px; border-radius: 4px; margin-left: 5px; }
        #status { text-align: center; margin: 20px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="route" placeholder="路線號碼..." maxlength="5">
        <button onclick="startSearch()">搜尋</button>
    </div>

    <div class="container">
        <div id="status"></div>
        <div id="output"></div>
    </div>

    <script>
        async function startSearch() {
            const route = document.getElementById('route').value.trim().toUpperCase();
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            if(!route) return;
            
            output.innerHTML = "";
            status.innerText = "定位中...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                status.innerText = "查詢附近站點...";

                try {
                    const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                    const stopData = await res.json();
                    
                    // 擴大搜索範圍至 1.5km，確保一定撈到站
                    let nearbyStops = stopData.data.filter(s => {
                        const d = Math.sqrt((s.lat - lat)**2 + (s.long - lon)**2) * 111;
                        return d < 1.5;
                    });

                    status.innerText = "查詢班次...";
                    let html = "";
                    let foundAny = false;
                    const directionMap = {};

                    // 處理所有符合路線的站點
                    for (let stop of nearbyStops) {
                        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stop.stop}`);
                        const data = await res.json();
                        if (!data.data) continue;
                        
                        const buses = data.data.filter(b => b.route === route);
                        if (buses.length === 0) continue;

                        buses.forEach(b => {
                            foundAny = true;
                            if (!directionMap[b.dest_tc]) directionMap[b.dest_tc] = [];
                            let stopEntry = directionMap[b.dest_tc].find(e => e.name === stop.name_tc);
                            if (!stopEntry) {
                                stopEntry = { name: stop.name_tc, etas: [] };
                                directionMap[b.dest_tc].push(stopEntry);
                            }
                            const mins = Math.max(0, Math.round((new Date(b.eta) - new Date()) / 60000));
                            if (stopEntry.etas.length < 3) stopEntry.etas.push(mins);
                        });
                    }

                    for (const [dest, stops] of Object.entries(directionMap)) {
                        html += `<div class="group-title">往 ${dest}</div>`;
                        stops.forEach(s => {
                            html += `<div class="card">
                                <div class="stop-info">${s.name}</div>
                                <div>${s.etas.map(m => `<span class="eta-time">${m}分</span>`).join('')}</div>
                            </div>`;
                        });
                    }

                    output.innerHTML = foundAny ? html : "附近沒有該路線的班次";
                    status.innerText = "";
                } catch(e) { status.innerText = "查詢失敗，請稍後再試"; }
            }, () => { status.innerText = "請允許定位權限"; });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Bus Tracker (Smart KMB Alternative)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; max-width: 576px; margin: 0 auto; font-family: -apple-system, sans-serif; }
        .eta-card { border-left: 5px solid #6c757d; }
        .badge-eta { font-size: 0.95rem; min-width: 95px; text-align: center; padding: 6px 4px; }
        .arrival-time { font-size: 0.7rem; display: block; opacity: 0.85; font-weight: normal; margin-top: 1px; }
        .dest-indicator { font-size: 0.65rem; display: block; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .border-imminent { border-left-color: #dc3545 !important; }
        .border-soon { border-left-color: #ffc107 !important; }
        .border-normal { border-left-color: #198754 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1"><i class="fa-solid fa-bus me-2 text-danger"></i> Smart KMB ETA Tracker</span>
        </div>
    </nav>

    <div class="container py-3">
        <!-- Search -->
        <div class="input-group mb-3 shadow-sm">
            <input type="text" id="routeInput" class="form-control form-control-lg text-uppercase" placeholder="Enter Route (e.g., 87D, 1A)" aria-label="Bus Route">
            <button class="btn btn-danger px-4" type="button" onclick="searchRoute()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <!-- Dynamic Destination-Based Direction Selectors -->
        <div id="directionBlock" class="d-grid gap-2 mb-3 d-none">
            <button type="button" id="dirOutbound" class="btn btn-danger text-start py-2 px-3 shadow-sm" onclick="switchDirection('outbound')">
                <i class="fa-solid fa-circle-arrow-right me-2"></i><span id="txtOutbound">Loading Outbound...</span>
            </button>
            <button type="button" id="dirInbound" class="btn btn-outline-danger text-start py-2 px-3 shadow-sm" onclick="switchDirection('inbound')">
                <i class="fa-solid fa-circle-arrow-right me-2"></i><span id="txtInbound">Loading Inbound...</span>
            </button>
        </div>

        <!-- UI Loader -->
        <div id="loading" class="text-center py-5 d-none">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="text-muted mt-2 small">Mapping route endpoints and stop arrays...</p>
        </div>

        <!-- Stops Display list -->
        <div id="stopList" class="list-group"></div>
    </div>

    <script>
        const API_BASE = "https://data.etabus.gov.hk/v1/transport/kmb";
        let currentRouteData = [];
        let currentDirection = "outbound"; 
        let activeRoute = "";
        
        // Named terminals mapped dynamically from API
        let destOutboundName = "Outbound";
        let destInboundName = "Inbound";

        async function searchRoute() {
            activeRoute = document.getElementById('routeInput').value.trim().toUpperCase();
            if (!activeRoute) return;

            toggleElement('loading', true);
            clearDisplay();
            document.getElementById('directionBlock').classList.add('d-none');

            try {
                // 1. Resolve terminal names for the buttons dynamically
                const routeMetaResp = await fetch(`${API_BASE}/route/${activeRoute}`);
                const routeMeta = await routeMetaResp.json();
                
                if(routeMeta.data && routeMeta.data.length > 0) {
                    // Match Outbound (O) and Inbound (I) destination targets
                    const outBoundMeta = routeMeta.data.find(r => r.dir === 'O');
                    const inBoundMeta = routeMeta.data.find(r => r.dir === 'I');
                    
                    destOutboundName = outBoundMeta ? outBoundMeta.dest_tc : "Outbound Target";
                    destInboundName = inBoundMeta ? inBoundMeta.dest_tc : "Inbound Target";
                    
                    document.getElementById('txtOutbound').innerText = `往 ${destOutboundName}`;
                    document.getElementById('txtInbound').innerText = `往 ${destInboundName}`;
                }

                // 2. Fetch structural stops
                const response = await fetch(`${API_BASE}/route-stop/${activeRoute}/outbound`);
                const stopData = await response.json();
                
                if (!stopData.data || stopData.data.length === 0) {
                    alert("Route code invalid or has no registered public data.");
                    toggleElement('loading', false);
                    return;
                }

                currentRouteData = stopData.data;
                await renderStops();
                
                document.getElementById('directionBlock').classList.remove('d-none');
            } catch (err) {
                console.error(err);
                alert("Data communication loss. Check connections.");
            } finally {
                toggleElement('loading', false);
            }
        }

        async function renderStops() {
            const listContainer = document.getElementById('stopList');
            listContainer.innerHTML = "";

            const stopsToRender = currentRouteData.filter(item => item.dir === currentDirection);
            const activeTargetDest = currentDirection === 'outbound' ? destOutboundName : destInboundName;

            for (const stop of stopsToRender) {
                const stopDetailResp = await fetch(`${API_BASE}/stop/${stop.stop}`);
                const stopDetail = await stopDetailResp.json();
                const stopName = stopDetail.data.name_tc || "Unknown Station Point";

                const card = document.createElement('div');
                card.id = `card-${stop.stop}`;
                card.className = "list-group-item list-group-item-action d-flex justify-content-between align-items-center mb-2 rounded eta-card p-3 shadow-sm";
                card.innerHTML = `
                    <div>
                        <small class="text-muted d-block font-monospace">SEQ ${stop.seq} • <span>往 ${activeTargetDest}</span></small>
                        <strong class="fs-5">${stopName}</strong>
                    </div>
                    <span class="badge bg-secondary badge-eta" id="eta-${stop.stop}">
                        Loading...
                    </span>
                `;
                listContainer.appendChild(card);

                fetchLiveETA(stop.stop, card.querySelector(`#eta-${stop.stop}`), card);
            }
        }

        async function fetchLiveETA(stopId, elementNode, cardNode) {
            try {
                const response = await fetch(`${API_BASE}/eta/${stopId}/${activeRoute}/1`);
                const etaResult = await response.json();
                
                const targetDirectionSig = currentDirection === 'outbound' ? 'O' : 'I';
                const relevantEtas = etaResult.data.filter(item => item.dir === targetDirectionSig);

                if (relevantEtas.length > 0 && relevantEtas[0].eta) {
                    const etaTime = new Date(relevantEtas[0].eta);
                    const diffMs = etaTime - new Date();
                    const minutesLeft = Math.round(diffMs / 60000);
                    const formattedClockTime = etaTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    // Pull endpoint string directly variant from data tracking matrix block
                    const specificDest = relevantEtas[0].dest_tc || ""; 

                    let timeDisplayStr = "";
                    let targetLabel = `<span class="dest-indicator">往 ${specificDest}</span>`;
                    
                    if (minutesLeft < 0) {
                        timeDisplayStr = `${targetLabel}Departed<span class="arrival-time">${formattedClockTime}</span>`;
                        elementNode.className = "badge bg-dark badge-eta";
                    } else if (minutesLeft === 0) {
                        timeDisplayStr = `${targetLabel}Arriving<span class="arrival-time">${formattedClockTime}</span>`;
                        elementNode.className = "badge bg-danger badge-eta";
                        cardNode.classList.add('border-imminent');
                    } else {
                        timeDisplayStr = `${targetLabel}${minutesLeft} min<span class="arrival-time">${formattedClockTime}</span>`;
                        
                        if (minutesLeft <= 3) {
                            elementNode.className = "badge bg-danger badge-eta";
                            cardNode.classList.add('border-imminent');
                        } else if (minutesLeft <= 8) {
                            elementNode.className = "badge bg-warning text-dark badge-eta";
                            cardNode.classList.add('border-soon');
                        } else {
                            elementNode.className = "badge bg-success badge-eta";
                            cardNode.classList.add('border-normal');
                        }
                    }

                    elementNode.innerHTML = timeDisplayStr;
                } else {
                    elementNode.innerText = "No Service";
                    elementNode.className = "badge bg-light text-muted border badge-eta";
                }
            } catch (e) {
                elementNode.innerText = "Error";
                elementNode.className = "badge bg-secondary badge-eta";
            }
        }

        function switchDirection(dir) {
            currentDirection = dir;
            
            // Toggle visual button designs
            document.getElementById('dirOutbound').className = `btn btn-${dir === 'outbound' ? 'danger' : 'outline-danger'} text-start py-2 px-3 shadow-sm`;
            document.getElementById('dirInbound').className = `btn btn-${dir === 'inbound' ? 'danger' : 'outline-danger'} text-start py-2 px-3 shadow-sm`;
            
            renderStops();
        }

        function toggleElement(id, show) {
            document.getElementById(id).classList.toggle('d-none', !show);
        }

        function clearDisplay() {
            document.getElementById('stopList').innerHTML = "";
        }
    </script>
</body>
</html>

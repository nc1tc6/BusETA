<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>九巴路徑快查</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .card { background: white; padding: 10px; margin-bottom: 4px; border-radius: 4px; border-left: 5px solid #ccc; }
        .nearest { border-left-color: #e31d2b; background: #fff0f0; }
        .group-title { font-weight: bold; margin: 20px 0 10px; color: #333; }
        .eta { color: #e31d2b; font-weight: bold; }
    </style>
</head>
<body>
    <input type="text" id="route" placeholder="例如: 6">
    <button onclick="searchRoute()">查詢</button>
    <div id="result"></div>

    <script>
        async function searchRoute() {
            const route = document.getElementById('route').value.toUpperCase();
            const pos = await new Promise(r => navigator.geolocation.getCurrentPosition(r));
            const { latitude: lat, longitude: lon } = pos.coords;

            // 1. Get all route-direction variations
            const routes = await (await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route/${route}`)).json();
            
            for (let r of routes.data) {
                // 2. Get stops in sequence for this specific direction
                const stops = await (await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${r.route}/${r.service_type}/${r.bound}`)).json();
                
                // 3. Find nearest stop index
                let nearestIdx = 0;
                let minDist = Infinity;
                
                // Need to fetch stop details to get coordinates for distance calculation
                const allStops = await (await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop`)).json();
                
                const sequence = stops.data.map(s => {
                    const info = allStops.data.find(st => st.stop === s.stop);
                    const d = Math.sqrt((info.lat - lat)**2 + (info.long - lon)**2);
                    if(d < minDist) { minDist = d; nearestIdx = stops.data.indexOf(s); }
                    return { ...s, name: info.name_tc };
                });

                // 4. Render sequence
                document.getElementById('result').innerHTML += `<div class="group-title">往 ${r.dest_tc}</div>`;
                for(let i=0; i<sequence.length; i++) {
                    const s = sequence[i];
                    const isNearest = (i === nearestIdx);
                    document.getElementById('result').innerHTML += `
                        <div class="card ${isNearest ? 'nearest' : ''}">
                            ${s.name} ${isNearest ? '(最接近)' : ''}
                            <div class="eta" id="eta-${s.stop}">查詢中...</div>
                        </div>`;
                    
                    // Fetch ETA for each stop
                    fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${s.stop}`)
                        .then(res => res.json())
                        .then(data => {
                            const bus = data.data.find(b => b.route === route);
                            const text = bus ? (Math.round((new Date(bus.eta)-new Date())/60000) <= 0 ? '到達' : Math.round((new Date(bus.eta)-new Date())/60000) + ' 分') : '-';
                            document.getElementById(`eta-${s.stop}`).innerText = text;
                        });
                }
            }
        }
    </script>
</body>
</html>

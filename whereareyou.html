<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Bus Stop Finder</title>
</head>
<body>
    <h1>Nearby Bus Stops</h1>
    <div id="log">Status: Initializing...</div>
    <div id="results"></div>

    <script>
        const logEl = document.getElementById("log");
        const resultsEl = document.getElementById("results");

        async function updateNearbyStops(lat, lon) {
            logEl.textContent = "Fetching live bus data...";
            
            const apiUrl = 'https://api.data.gov.hk/v1/transport/kmb-bus-stop-location';
            const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(apiUrl);

            try {
                const response = await fetch(proxyUrl);
                const json = await response.json(); 
                const data = JSON.parse(json.contents);
                
                // DEBUG: Check what the data actually looks like
                console.log("API Response:", data);

                // Use optional chaining or a check to prevent the 'undefined' error
                const stops = data.data || []; 

                if (!Array.isArray(stops)) {
                    throw new Error("Data format error: 'data' is not an array");
                }

                resultsEl.innerHTML = "<h3>Stops found:</h3>";
                let foundCount = 0;

                stops.forEach(stop => {
                    // Make sure lat/long exist before calculating
                    if (stop.lat && stop.long) {
                        const dist = getDistance(lat, lon, parseFloat(stop.lat), parseFloat(stop.long));
                        if (dist <= 0.4) {
                            resultsEl.innerHTML += `<p>${stop.name_en} (${(dist * 1000).toFixed(0)}m away)</p>`;
                            foundCount++;
                        }
                    }
                });

                logEl.textContent = foundCount > 0 ? `Found ${foundCount} stops.` : "No stops found.";
            } catch (e) {
                logEl.textContent = "Error: " + e.message;
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        navigator.geolocation.watchPosition(
            (pos) => updateNearbyStops(pos.coords.latitude, pos.coords.longitude),
            (err) => logEl.textContent = "Geolocation error."
        );
    </script>
</body>
</html>

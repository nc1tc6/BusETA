<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KMB Bus Finder</title>
</head>
<body>
    <h1>Nearby Bus Stops</h1>
    <div id="log">Status: Connecting to official API...</div>
    <div id="results"></div>

    <script>
        const logEl = document.getElementById("log");
        const resultsEl = document.getElementById("results");

        async function getStops() {
            logEl.textContent = "Fetching official data...";
            try {
                // Official endpoint for KMB
                const response = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                const json = await response.json();
                
                // KMB API format: 'data' contains the array
                return json.data;
            } catch (e) {
                logEl.textContent = "Direct API Error. Trying secondary method...";
                return [];
            }
        }

        async function update(lat, lon) {
            const stops = await getStops();
            if (stops.length === 0) return;

            resultsEl.innerHTML = "";
            let count = 0;

            stops.forEach(stop => {
                const dist = getDistance(lat, lon, parseFloat(stop.lat), parseFloat(stop.long));
                if (dist <= 0.4) {
                    resultsEl.innerHTML += `<p>📍 ${stop.name_en} (${(dist * 1000).toFixed(0)}m)</p>`;
                    count++;
                }
            });
            logEl.textContent = `Found ${count} stops within 5 mins walk.`;
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        navigator.geolocation.watchPosition(
            (pos) => update(pos.coords.latitude, pos.coords.longitude),
            (err) => logEl.textContent = "Please enable location."
        );
    </script>
</body>
</html>

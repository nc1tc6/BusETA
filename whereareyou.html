<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>九巴穩定搜尋器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .card { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 8px; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="route" placeholder="路線編號 (如 35A)">
        <button onclick="startSearch()">搜尋</button>
        <div id="output"></div>
    </div>

    <script>
        async function startSearch() {
            const route = document.getElementById('route').value.trim().toUpperCase();
            const output = document.getElementById('output');
            output.innerHTML = "查詢中...";

            try {
                // 1. 取得路線所有站點 (最穩定的 API 寫法)
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/1/1`);
                const json = await res.json();
                
                if (json.data.length === 0) throw new Error("無效路線");

                // 2. 獲取所有站點位置
                const stopRes = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                const stopJson = await stopRes.json();
                
                // 3. 簡單過濾並顯示前 5 個站點作測試
                const routeStopIds = json.data.map(s => s.stop);
                const results = stopJson.data.filter(s => routeStopIds.includes(s.stop)).slice(0, 5);
                
                output.innerHTML = results.map(s => `<div class="card">${s.name_tc}</div>`).join('');
            } catch (e) {
                output.innerHTML = `<div class="error">找不到路線資訊，請確保編號正確。</div>`;
            }
        }
    </script>
</body>
</html>

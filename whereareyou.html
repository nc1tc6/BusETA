<!DOCTYPE html>
<html>
<body>
    <h1>My Live Location & Street Name</h1>
    <p id="location">Loading...</p>
    <p id="address">Fetching address...</p>

    <script>
        const locationEl = document.getElementById("location");
        const addressEl = document.getElementById("address");

        function updateAddress(lat, lon) {
            // Using OpenStreetMap's free API
            const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    // address.road is usually the street name
                    const street = data.address.road || "Street name not found";
                    addressEl.textContent = "Street: " + street;
                })
                .catch(err => {
                    addressEl.textContent = "Could not fetch address.";
                });
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                locationEl.textContent = `Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}`;
                
                // Update the address whenever the location changes
                updateAddress(lat, lon);
            });
        } else {
            locationEl.textContent = "Geolocation not supported.";
        }
    </script>
</body>
</html>

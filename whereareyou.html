<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>九巴全動態站點查詢</title>
</head>
<body onload="dynamicDiscovery()">
    <div id="ui">正在進行全動態站點掃描... (這可能需要一點時間)</div>

    <script>
        async function dynamicDiscovery() {
            const ui = document.getElementById('ui');
            
            // 1. 取得全港所有路線
            const routeRes = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/');
            const { data: routes } = await routeRes.json();
            
            ui.innerHTML = "正在解析路線站點...";
            
            const stopMap = new Map(); // 用 Map 儲存，確保 ID 唯一且包含所有資訊

            // 2. 動態遍歷路線 (這裡示範抓取前 20 條路線，實際可改為全部)
            for (let i = 0; i < 20; i++) {
                const r = routes[i];
                const stopRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${r.route}/${r.service_type}/${r.bound}`);
                const { data: stops } = await stopRes.json();
                
                stops.forEach(s => {
                    if (!stopMap.has(s.stop)) {
                        stopMap.set(s.stop, s);
                    }
                });
            }

            ui.innerHTML = `掃描完成！已發現 ${stopMap.size} 個動態站點。`;
            // 接下來將這些動態抓到的 stopMap 轉為陣列，依距離排序即可
            console.log(stopMap); 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<body onload="getAllBusStops()">
    <div id="status">正在從所有路線反向挖掘站點代碼... (這會花一點時間)</div>
    <div id="list"></div>

    <script>
        async function getAllBusStops() {
            const status = document.getElementById('status');
            const list = document.getElementById('list');
            
            // 1. 抓取所有路線
            const routesRes = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/');
            const routes = (await routesRes.json()).data;
            
            const fullList = new Map();

            // 2. 遍歷每條路線 (為了保護你的請求不被封鎖，我們分批抓)
            for (let r of routes.slice(0, 50)) { // 示範：抓前 50 條路線
                try {
                    const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${r.route}/${r.service_type}/${r.bound}`);
                    const data = (await res.json()).data;
                    data.forEach(s => {
                        if (!fullList.has(s.stop)) fullList.set(s.stop, s.stop);
                    });
                } catch(e) {}
            }
            
            status.innerHTML = `<h3>掃描完成，共找到 ${fullList.size} 個唯一代碼</h3>`;
            list.innerHTML = Array.from(fullList.keys()).join('<br>');
        }
    </script>
</body>
</html>

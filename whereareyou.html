<script>
    fetch('data.json?t=' + new Date().getTime())
        .then(response => response.json())
        .then(data => {
            const listDiv = document.getElementById('bus-list');
            listDiv.innerHTML = ''; 

            // 只取前 5 筆數據，避免重複與版面爆炸
            const limitedData = data.data.slice(0, 5); 

            limitedData.forEach(bus => {
                const etaTime = new Date(bus.eta);
                const now = new Date();
                const diff = Math.round((etaTime - now) / 60000);
                
                const card = document.createElement('div');
                card.className = 'bus-card';
                card.innerHTML = `
                    <strong>路線: ${bus.route}</strong><br>
                    目的地: ${bus.dest_en}<br>
                    預計到達: ${diff > 0 ? diff + ' 分鐘後' : '即將到達'}
                `;
                listDiv.appendChild(card);
            });
        })
        .catch(err => {
            document.getElementById('bus-list').innerText = "載入數據中...";
        });
</script>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>巴士到站系統</title>
</head>
<body>

    <h1 id="status">正在載入中...</h1>
    <div id="bus-list"></div>

    <script>
        fetch('data.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                const listDiv = document.getElementById('bus-list');
                const statusH1 = document.getElementById('status');
                
                if (listDiv) {
                    statusH1.innerText = "數據已更新";
                    listDiv.innerText = "成功取得數據: " + JSON.stringify(data).substring(0, 50);
                } else {
                    console.error("找不到 ID 為 bus-list 的元素");
                }
            })
            .catch(err => {
                document.getElementById('status').innerText = "發生錯誤: " + err.message;
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KMB Route Finder</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 20px; }
        .stop-card { border: 1px solid #ddd; padding: 15px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Bus Arrival by Route</h1>
    
    <div class="controls">
        <input type="text" id="routeInput" placeholder="Enter Route (e.g. 6)">
        <button onclick="runSearch()">Search</button>
    </div>
    
    <div id="status">Click search to find your route...</div>
    <div id="results"></div>

    <script>
        const statusEl = document.getElementById("status");
        const resultsEl = document.getElementById("results");

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function runSearch() {
            const route = document.getElementById("routeInput").value.toUpperCase();
            if (!route) return alert("Please enter a route number.");

            statusEl.textContent = "Getting location...";
            
            // 1. Get Location
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                statusEl.textContent = "Searching for nearby stops for route " + route + "...";

                // 2. Fetch all stops
                const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                const { data: allStops } = await res.json();

                // 3. Find stops within 500m
                const nearbyStops = allStops.filter(s => getDistance(latitude, longitude, s.lat, s.long) < 0.5);

                resultsEl.innerHTML = "";
                let found = false;

                // 4. Check each nearby stop for the route
                for (let stop of nearbyStops) {
                    const etaRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stop.stop}`);
                    const { data: etaData } = await etaRes.json();
                    
                    const bus = etaData.find(b => b.route === route);
                    if (bus) {
                        found = true;
                        const mins = Math.max(0, Math.round((new Date(bus.eta) - new Date()) / 60000));
                        resultsEl.innerHTML += `<div class="stop-card">
                            <strong>${stop.name_en}</strong><br>
                            Next ${route}: ${bus.eta ? mins + " mins" : "Scheduled"}
                        </div>`;
                    }
                }
                statusEl.textContent = found ? "Results found." : "No upcoming buses for route " + route + " nearby.";
            }, () => statusEl.textContent = "Location access denied.");
        }
    </script>
</body>
</html>

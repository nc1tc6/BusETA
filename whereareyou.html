<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>九巴自動校正搜尋器</title>
</head>
<body>
    <input type="text" id="route" value="35A" placeholder="路線編號">
    <button onclick="smartSearch()">搜尋路線</button>
    <div id="output"></div>

    <script>
        async function smartSearch() {
            const route = document.getElementById('route').value.trim().toUpperCase();
            const output = document.getElementById('output');
            output.innerHTML = "正在獲取路線正確參數...";

            try {
                // 1. 先從總表抓取該路線的正確 service_type 和 bound
                const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/');
                const json = await res.json();
                
                // 找出該路線編號的資料
                const routeInfo = json.data.find(r => r.route === route);
                
                if (!routeInfo) throw new Error("找不到此路線");

                // 2. 使用官方提供的 service_type 和 bound (這能確保絕對不會出現 422 錯誤)
                const url = `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${routeInfo.service_type}/${routeInfo.bound}`;
                
                const stopRes = await fetch(url);
                const stopJson = await stopRes.json();
                
                output.innerHTML = `成功！路線 ${route} 使用參數 Service:${routeInfo.service_type}, Bound:${routeInfo.bound}，共找到 ${stopJson.data.length} 個站點。`;
                console.log("站點資料:", stopJson.data);

            } catch (e) {
                output.innerHTML = "錯誤: " + e.message;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Bus Arrival</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .stop-card { border: 1px solid #ddd; padding: 15px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Nearby Bus Arrival</h1>
    <div id="status">Getting your location...</div>
    <div id="eta-results"></div>

    <script>
        const statusEl = document.getElementById("status");
        const resultsEl = document.getElementById("eta-results");

        // 1. Calculate distance between two points
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 2. Main workflow
        async function init() {
            try {
                // A. Get User Location
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
                const { latitude: myLat, longitude: myLon } = pos.coords;
                statusEl.textContent = "Location found. Searching for nearest bus stop...";

                // B. Fetch all KMB stops
                const response = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                const { data: allStops } = await response.json();

                // C. Find the nearest stop (within 400m)
                let nearest = null;
                let minDist = 0.4;
                allStops.forEach(stop => {
                    const d = getDistance(myLat, myLon, parseFloat(stop.lat), parseFloat(stop.long));
                    if (d < minDist) { minDist = d; nearest = stop; }
                });

                if (!nearest) {
                    statusEl.textContent = "No bus stops within 400m.";
                    return;
                }

                // D. Fetch ETA for the nearest stop
                statusEl.textContent = `Nearest stop: ${nearest.name_en}. Fetching ETA...`;
                const etaResponse = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${nearest.stop}`);
                const { data: etaData } = await etaResponse.json();

                // E. Display Results
                resultsEl.innerHTML = `<h3>${nearest.name_en}</h3>`;
                if (etaData.length === 0) {
                    resultsEl.innerHTML += "<p>No upcoming buses currently found.</p>";
                } else {
                    etaData.forEach(bus => {
                        const etaTime = new Date(bus.eta);
                        const mins = Math.max(0, Math.round((etaTime - new Date()) / 60000));
                        resultsEl.innerHTML += `<div class="stop-card">
                            <strong>Route ${bus.route}</strong>: ${bus.eta ? mins + " mins" : "Scheduled"} 
                            (${bus.dest_en})
                        </div>`;
                    });
                }
            } catch (err) {
                statusEl.textContent = "Error: " + err.message;
            }
        }

        init();
    </script>
</body>
</html>

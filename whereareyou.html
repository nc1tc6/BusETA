<!DOCTYPE html>
<html lang="zh-HK">
<body>
    <h3>九巴原始數據調試器</h3>
    <button onclick="fetchRawData()">獲取原始站點清單</button>
    <pre id="raw-output" style="background:#eee; padding:10px; height:300px; overflow:scroll;"></pre>

    <script>
        async function fetchRawData() {
            const out = document.getElementById('raw-output');
            out.innerText = "正在讀取原始數據...";
            try {
                // 讀取官方所有站點清單
                const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                const data = await res.json();
                out.innerText = JSON.stringify(data.data, null, 2);
            } catch (e) {
                out.innerText = "讀取失敗，請檢查網路連線或 CORS 限制。";
            }
        }
    </script>
</body>
</html>

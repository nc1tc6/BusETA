<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debug Test</title>
</head>
<body>
    <button onclick="testConnection()">測試連接九巴 API</button>
    <div id="log"></div>

    <script>
        async function testConnection() {
            const log = document.getElementById("log");
            log.innerText = "正在測試...";
            try {
                // 測試連線到九巴所有車站列表
                const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                if (!res.ok) throw new Error("HTTP 錯誤: " + res.status);
                const data = await res.json();
                log.innerText = "成功！已讀取到 " + data.data.length + " 個車站資料。";
            } catch (e) {
                log.innerText = "失敗: " + e.message;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴到站搜尋器 (進階版)</title>
    <style>
        :root { --primary: #e31d2b; } /* 九巴紅 */
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 16px; margin: 10px 0; border-radius: 12px; border-left: 5px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
        .stop-info { font-size: 0.85rem; color: #666; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .bus-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .eta-time { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h3>九巴實時搜尋</h3>
        <div class="header">
            <input type="text" id="route" placeholder="輸入路線 (如 6)">
            <button onclick="startSearch()">搜尋</button>
        </div>
        <div id="status"></div>
        <div id="output"></div>
    </div>

    <script>
        async function fetchWithRetry(url, retries = 2) {
            try { const res = await fetch(url); return await res.json(); }
            catch (e) { if(retries > 0) return fetchWithRetry(url, retries - 1); throw e; }
        }

        async function startSearch() {
            const route = document.getElementById('route').value.trim().toUpperCase();
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            if(!route) return;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                status.innerText = "搜尋中...";
                
                try {
                    const stopData = await fetchWithRetry('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                    
                    // 1. 計算距離並加入陣列
                    let nearby = stopData.data.map(s => ({
                        ...s,
                        dist: Math.sqrt((s.lat - lat)**2 + (s.long - lon)**2) * 111 // 簡單距離估算(km)
                    })).filter(s => s.dist < 0.8).sort((a, b) => a.dist - b.dist);

                    if(nearby.length === 0) return status.innerText = "附近無站點";

                    // 2. 獲取 ETA
                    const results = await Promise.all(nearby.map(async (stop) => {
                        const data = await fetchWithRetry(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stop.stop}`);
                        return { ...stop, buses: (data.data || []).filter(b => b.route === route) };
                    }));

                    // 3. 渲染
                    output.innerHTML = "";
                    status.innerText = "";
                    results.filter(r => r.buses.length > 0).forEach(s => {
                        let html = `<div class="card"><div class="stop-info">${s.name_tc} | ${s.dist.toFixed(2)}km</div>`;
                        s.buses.forEach(b => {
                            const mins = Math.max(0, Math.round((new Date(b.eta) - new Date()) / 60000));
                            html += `<div class="bus-row">
                                        <span>往 ${b.dest_tc}</span>
                                        <span class="eta-time">${mins} 分鐘</span>
                                     </div>`;
                        });
                        output.innerHTML += html + `</div>`;
                    });
                } catch(e) { status.innerText = "讀取失敗"; }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴到站搜尋器 (原邏輯版)</title>
    <style>
        :root { --primary: #e31d2b; }
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .group-title { font-size: 1.2rem; color: #333; margin: 20px 0 10px; font-weight: bold; border-left: 5px solid var(--primary); padding-left: 10px; }
        .card { background: white; padding: 12px; margin: 8px 0; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .stop-name { font-size: 0.85rem; color: #666; font-weight: bold; margin-bottom: 5px; }
        .bus-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.9rem; }
        .eta-time { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h3>九巴搜尋 (按方向分組)</h3>
        <div style="display:flex; gap:5px; margin-bottom: 10px;">
            <input type="text" id="route" placeholder="路線 (如 6)" style="flex:1; padding:10px;">
            <input type="number" id="radius" value="1.0" step="0.5" min="0.1" max="5.0" style="width: 70px; padding:10px;" placeholder="半徑(km)">
            <button onclick="startSearch()" style="padding:10px; background:var(--primary); color:white; border:none; border-radius:4px;">搜尋</button>
        </div>
        <div id="status" style="margin:10px 0; color:#666;"></div>
        <div id="output"></div>
    </div>

    <script>
        async function fetchWithRetry(url, retries = 2) {
            try { const res = await fetch(url); return await res.json(); }
            catch (e) { if(retries > 0) return fetchWithRetry(url, retries - 1); throw e; }
        }

        async function startSearch() {
            const route = document.getElementById('route').value.trim().toUpperCase();
            const radius = parseFloat(document.getElementById('radius').value) || 1.0;
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            if(!route) return;
            
            output.innerHTML = "";
            status.innerText = "定位中...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                status.innerText = "查詢中...";

                try {
                    const stopData = await fetchWithRetry('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                    // 這裡完全依照您原本的計算與過濾邏輯，僅將 1.0 改為變數 radius
                    let allNearby = stopData.data.map(s => ({
                        ...s,
                        dist: Math.sqrt((s.lat - lat)**2 + (s.long - lon)**2) * 111
                    })).filter(s => s.dist < radius).sort((a, b) => a.dist - b.dist);

                    const directionMap = {}; 

                    for (let stop of allNearby) {
                        const data = await fetchWithRetry(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stop.stop}`);
                        const buses = (data.data || []).filter(b => b.route === route);
                        
                        buses.forEach(b => {
                            if (!directionMap[b.dest_tc]) directionMap[b.dest_tc] = [];
                            
                            let stopEntry = directionMap[b.dest_tc].find(e => e.stop === stop.stop);
                            
                            if (!stopEntry && new Set(directionMap[b.dest_tc].map(i => i.stop)).size < 2) {
                                stopEntry = { stop: stop.stop, name: stop.name_tc, dist: stop.dist, etas: [] };
                                directionMap[b.dest_tc].push(stopEntry);
                            }
                            
                            if (stopEntry && stopEntry.etas.length < 3) {
                                const mins = Math.max(0, Math.round((new Date(b.eta) - new Date()) / 60000));
                                if (mins > 0) stopEntry.etas.push(mins);
                            }
                        });
                    }

                    for (const [dest, stops] of Object.entries(directionMap)) {
                        let groupHtml = `<div class="group-title">往 ${dest}</div>`;
                        let hasContent = false;

                        stops.forEach(s => {
                            if (s.etas.length > 0) {
                                hasContent = true;
                                let html = `<div class="card"><div class="stop-name">${s.name} (${s.dist.toFixed(2)}km)</div>`;
                                s.etas.forEach(mins => {
                                    html += `<div class="bus-row"><span>預計到達</span><span class="eta-time">${mins} 分鐘</span></div>`;
                                });
                                groupHtml += html + `</div>`;
                            }
                        });

                        if (hasContent) output.innerHTML += groupHtml;
                    }
                    
                    if (!output.innerHTML) status.innerText = "目前沒有即將到站的班次";
                    else status.innerText = "";

                } catch(e) { status.innerText = "讀取失敗"; }
            });
        }
    </script>
</body>
</html>

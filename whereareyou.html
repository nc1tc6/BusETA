<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>九巴強制搜尋器 (解決 422 錯誤)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 10px; margin: 5px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <input type="text" id="route" value="35A" placeholder="路線編號">
    <button onclick="startSearch()">搜尋</button>
    <div id="output"></div>

    <script>
        async function startSearch() {
            const route = document.getElementById('route').value.trim().toUpperCase();
            const output = document.getElementById('output');
            output.innerHTML = "查詢中...";

            try {
                // 1. 取得所有路線清單以獲取正確的 service_type 和 bound
                const listRes = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/');
                const listJson = await listRes.json();
                
                // 2. 找到該路線所有可能的服務類型與方向組合
                const variants = listJson.data.filter(r => r.route === route);
                if (variants.length === 0) throw new Error("找不到此路線");

                // 3. 嘗試第一個合法組合 (如果失敗，API 就不會回傳 Invalid direction)
                const v = variants[0];
                const url = `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${v.service_type}/${v.bound}`;
                
                const stopRes = await fetch(url);
                const stopJson = await stopRes.json();

                if (!stopJson.data) throw new Error("無站點資料");

                output.innerHTML = `成功！使用參數 (Service:${v.service_type}, Bound:${v.bound})<br>`;
                output.innerHTML += stopJson.data.map(s => `<div class="card">${s.stop}</div>`).join('');
                
            } catch (e) {
                output.innerHTML = "錯誤: " + e.message;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九巴到站搜尋器 (穩定版)</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f9f9f9; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .controls { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h3>九巴實時到站搜尋</h3>
        <div class="controls">
            <input type="text" id="route" placeholder="路線 (如 6)">
            <button onclick="startSearch()">搜尋</button>
        </div>
        <div id="status"></div>
        <div id="output"></div>
    </div>

    <script>
        // 具備重試機制的 Fetch，解決偶發 Load failed
        async function fetchWithRetry(url, retries = 2) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("HTTP Error");
                return await res.json();
            } catch (err) {
                if (retries > 0) return fetchWithRetry(url, retries - 1);
                throw err;
            }
        }

        async function startSearch() {
            const route = document.getElementById('route').value.trim().toUpperCase();
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            
            if(!route) return alert("請輸入路線");
            
            output.innerHTML = "";
            status.innerText = "定位中...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                status.innerText = "正在搜尋附近站點...";

                try {
                    const stopData = await fetchWithRetry('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                    const nearby = stopData.data.filter(s => 
                        Math.sqrt((s.lat - lat)**2 + (s.long - lon)**2) < 0.005
                    );

                    if(nearby.length === 0) return status.innerText = "附近沒有站點";

                    status.innerText = `找到 ${nearby.length} 個站點，讀取資訊中...`;

                    // 並行請求所有 ETA，速度快且不易被限流
                    const etaResults = await Promise.all(nearby.map(async (stop) => {
                        const data = await fetchWithRetry(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stop.stop}`);
                        return { name: stop.name_tc, buses: data.data || [] };
                    }));

                    status.innerText = "";
                    etaResults.forEach(item => {
                        const filtered = item.buses.filter(b => b.route === route);
                        if(filtered.length > 0) {
                            let html = `<div class="card"><strong>${item.name}</strong><br>`;
                            filtered.forEach(b => {
                                const mins = Math.max(0, Math.round((new Date(b.eta) - new Date()) / 60000));
                                html += `路線 ${b.route} 往 ${b.dest_tc}: ${mins} 分鐘<br>`;
                            });
                            output.innerHTML += html + `</div>`;
                        }
                    });
                    
                    if(!output.innerHTML) status.innerText = "附近沒有該路線的班次";
                } catch(err) {
                    status.innerText = "讀取失敗，請檢查網路或重試";
                }
            }, () => status.innerText = "請允許定位權限");
        }
    </script>
</body>
</html>

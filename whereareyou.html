<!DOCTYPE html>
<html>
<body>
    <h1>Dynamic Live Bus Stops</h1>
    <div id="results">Loading live data...</div>

    <script>
        const resultsDiv = document.getElementById("results");

        // 1. Function to get live data from an external source
        async function fetchBusStops() {
            try {
                // Example: A publicly accessible endpoint for bus stops
                const response = await fetch('https://api.example-hk-transport.com/stops'); 
                return await response.json(); 
            } catch (error) {
                console.error("Data error", error);
                return [];
            }
        }

        // 2. Watch position and filter dynamic list
        navigator.geolocation.watchPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const allStops = await fetchBusStops(); // Fetch new list every time
            
            resultsDiv.innerHTML = ""; 
            
            allStops.forEach(stop => {
                // ... perform the same distance calculation ...
                if (getDistance(latitude, longitude, stop.lat, stop.lon) < 0.5) {
                    const el = document.createElement("div");
                    el.innerText = stop.name;
                    resultsDiv.appendChild(el);
                }
            });
        });
    </script>
</body>
</html>

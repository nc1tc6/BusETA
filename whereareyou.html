<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusLive 2026</title>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: system-ui; background: #f8fafc; margin: 0; padding-bottom: 20px; }
        
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 16px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .container { max-width: 600px; margin: 20px auto; padding: 0 16px; }
        
        /* Loading Spinner */
        #status { text-align: center; color: #64748b; margin: 20px 0; font-style: italic; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .stop-card { background: white; padding: 16px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .eta-grid { display: flex; justify-content: space-between; padding: 8px 0; }
        .mins { background: #dbeafe; color: #1e40af; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="routeInput" placeholder="Enter route (e.g. 6)">
        <button onclick="runSearch()">Find</button>
    </div>

    <div class="container">
        <div id="status"></div>
        <div id="results"></div>
    </div>

    <script>
        function setStatus(msg, showSpinner = false) {
            const status = document.getElementById("status");
            status.innerHTML = showSpinner ? `<div class="spinner"></div>${msg}` : msg;
        }

        async function runSearch() {
            const route = document.getElementById("routeInput").value.toUpperCase();
            if(!route) return;

            setStatus("Locating you...", true);
            
            // Set a timeout to stop loading if GPS hangs
            const geoOptions = { timeout: 10000, enableHighAccuracy: true };
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                setStatus("Fetching bus data...", true);
                
                try {
                    const { latitude, longitude } = pos.coords;
                    const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                    const { data: allStops } = await res.json();

                    const nearby = allStops.filter(s => getDistance(latitude, longitude, s.lat, s.long) < 0.5);
                    const results = document.getElementById("results");
                    results.innerHTML = "";
                    
                    if (nearby.length === 0) setStatus("No nearby stops found.");
                    else setStatus("");

                    for (let stop of nearby) {
                        const etaRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stop.stop}`);
                        const { data: etaData } = await etaRes.json();
                        const buses = etaData.filter(b => b.route === route);
                        
                        if (buses.length > 0) {
                            let html = `<div class="stop-card"><h3>${stop.name_en}</h3>`;
                            buses.slice(0, 3).forEach(b => {
                                const mins = Math.max(0, Math.round((new Date(b.eta) - new Date()) / 60000));
                                html += `<div class="eta-grid"><span>${b.dest_en}</span><span class="mins">${mins} min</span></div>`;
                            });
                            results.innerHTML += html + `</div>`;
                        }
                    }
                } catch(e) {
                    setStatus("Error loading data.");
                }
            }, (err) => {
                setStatus("Location access denied or timed out.");
            }, geoOptions);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>

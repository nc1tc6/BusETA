<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusLive 2026</title>
    <style>
        /* ... (previous styles remain the same) ... */
        .controls { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
        select { padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="controls">
            <input type="text" id="routeInput" placeholder="Route (e.g. 6)">
            <select id="langSelect">
                <option value="en">English</option>
                <option value="tc">繁體</option>
                <option value="sc">简体</option>
            </select>
            <button onclick="runSearch()">Find</button>
        </div>
    </div>

    <div id="status-bar"></div>
    <div class="container" id="results"></div>

    <script>
        // Mapping API fields to our language selection
        const langMap = { en: 'name_en', tc: 'name_tc', sc: 'name_sc' };
        const destMap = { en: 'dest_en', tc: 'dest_tc', sc: 'dest_sc' };

        async function runSearch() {
            const route = document.getElementById("routeInput").value.toUpperCase();
            const lang = document.getElementById("langSelect").value;
            if(!route) return;

            setStatus("Locating...");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');
                const { data: allStops } = await res.json();

                // Find stops
                const nearby = allStops.filter(s => getDistance(pos.coords.latitude, pos.coords.longitude, s.lat, s.long) < 0.5);
                const results = document.getElementById("results");
                results.innerHTML = "";

                for (let stop of nearby) {
                    const etaRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stop.stop}`);
                    const { data: etaData } = await etaRes.json();
                    const buses = etaData.filter(b => b.route === route);
                    
                    if (buses.length > 0) {
                        // Dynamic key access based on language selection
                        let html = `<div class="stop-card"><h3>${stop[langMap[lang]]}</h3>`;
                        buses.slice(0, 3).forEach(b => {
                            const mins = Math.max(0, Math.round((new Date(b.eta) - new Date()) / 60000));
                            html += `<div class="eta-grid"><span class="dest">${b[destMap[lang]]}</span><span class="mins">${mins} min</span></div>`;
                        });
                        results.innerHTML += html + `</div>`;
                    }
                }
            });
        }
        
        // ... (Keep getDistance function and setStatus function)
    </script>
</body>
</html>
